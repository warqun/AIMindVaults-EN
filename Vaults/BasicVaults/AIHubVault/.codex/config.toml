# Codex project config
# Reference: https://developers.openai.com/codex/config-advanced/

# Max read size for CODEX.md (default 32KB → expanded to 64KB)
# Leaves headroom so loading instructions can include all of .codex/rules/
project_doc_max_bytes = 65536

# Fallback filenames to read in subdirectories (based on CODEX.md)
project_doc_fallback_filenames = ["CODEX.md"]
